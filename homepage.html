<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valorant Agent Voting</title>
  <link rel="stylesheet" href="homepage.css"/>
</head>
<body>
  <div class="container">

      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">
      <img src="https://static.wikia.nocookie.net/valorant/images/7/74/Sage_icon.png/revision/latest?cb=20220316150523&path-prefix=id" alt="Sage">
      <h3>Sage</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">
      <img src="https://static.wikia.nocookie.net/valorant/images/b/b0/Reyna_icon.png/revision/latest/scale-to-width-down/250?cb=20230606161102" alt="Reyna">
      <h3>Reyna</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">

      <button class="vote-btn">Vote</button>
    </div>

      <h3>Raze</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">
      <img src="https://static.wikia.nocookie.net/valorant/images/8/88/Cypher_icon.png/revision/latest/scale-to-width-down/250?cb=20230523180623" alt="Cypher">
      <h3>Cypher</h3>
      <button class="vote-btn">Vote</button>

    <div class="card">

      <h3>Sova</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">
      <img src="https://static.wikia.nocookie.net/valorant/images/4/4d/Brimstone_icon.png/revision/latest/scale-to-width-down/250?cb=20230523180558" alt="Brimstone">
      <h3>Brimstone</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">
      <img src="https://static.valorantstats.xyz/agent-headshots/omen-headshot.png" alt="Omen">
      <h3>Omen</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">
      <img src="https://static.valorantstats.xyz/agent-headshots/viper-headshot.png" alt="Viper">
      <h3>Viper</h3>
      <button class="vote-btn">Vote</button>
    </div>
    <div class="card">

      <h3>Skye</h3>
      <button class="vote-btn">Vote</button>
    </div>

      <img src="https://pbs.twimg.com/media/Fv-F8sJX0AIlLPf.png" alt="Chamber">
